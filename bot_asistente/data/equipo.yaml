# =============================================================================
# Equipo interno de Innovación Fashion
# =============================================================================
#
# Define los SUPERIORES a los que el bot escala según el tipo de duda.
# El bot consulta este archivo en runtime — no requiere reiniciar el servicio.
#
# Reglas:
#   - El primer miembro con `es_fallback: true` recibe TODO lo que no encaje
#     en otra área. Hoy: Fabio.
#   - El bot busca por `areas` exactas primero, después cae al fallback.
#   - Si necesitas agregar un superior nuevo: pegarle un bloque debajo, salvar
#     el archivo, y el bot lo usa al próximo mensaje.
#
# Áreas reconocidas por el bot (los tools usan estos valores):
#   - pagos             → confirmar pagos, ver comprobantes
#   - pedidos           → coordinar despacho, problema con pedido
#   - telas_calidad     → preguntas sobre material, costura, calidad
#   - mayorista         → precios al por mayor, descuentos, condiciones
#   - envios_nacionales → envíos fuera Cartagena
#   - tienda_fisica     → direcciones/horarios de las 8 sedes
#   - quejas            → reclamos serios, devoluciones, garantía
#   - tecnico           → preguntas técnicas, problemas con el bot
#   - otro              → cualquier cosa no clasificada
#
# IMPORTANTE: los números NUNCA se mencionan al cliente. El bot solo le dice
# "déjame consultar con el equipo".
# =============================================================================

miembros:
  # ⚠️ MODO TESTING — Stiven se hace pasar por Fabio temporalmente.
  # Cuando termine el testing, cambiar numero_whatsapp a "+573019836645" (Fabio real).
  - nombre: Fabio (test = Stiven)
    numero_whatsapp: "+573026444564"
    rol: administrador
    es_fallback: true              # recibe todo lo que no esté en otras áreas
    areas:
      - pagos
      - pedidos
      - mayorista
      - otro
    horario:
      lunes_a_sabado: "08:00-22:00"
      domingo: "10:00-18:00"
    activo: true
    notas: "Confirma pagos en la app del banco. Coordina despachos."

  # Ejemplo de cómo agregar otro superior (descomenta y completa):
  #
  # - nombre: Maria
  #   numero_whatsapp: "+57300xxxxxxx"
  #   rol: especialista_telas
  #   es_fallback: false
  #   areas:
  #     - telas_calidad
  #   horario:
  #     lunes_a_sabado: "09:00-18:00"
  #     domingo: cerrado
  #   activo: true
  #   notas: "Sabe de materiales, composición, lavado. Si Maria no está, escalar a Fabio."

# =============================================================================
# Números INTERNOS — el bot NUNCA responde a estos
# =============================================================================
# Lista de números del equipo de Innovación Fashion (asesoras + admins + bots
# de otra empresa que comparten línea, etc.). Si llega un mensaje desde alguno
# de estos números, el bot lo ignora silenciosamente.
#
# Distinto a "bloqueado" (que es alerta a Fabio): estos NO requieren alerta,
# simplemente no son clientes.

numeros_internos:
  # Asesoras humanas que comparten la línea
  - numero: "+573243798269"
    nombre: "Línea producción (Yirleis/equipo asesoras)"
    razon: "Línea compartida en producción — los humanos escriben desde aquí"

  # Números prohibidos bidireccionales (también van a `clientes.bloqueado=true`)
  - numero: "+573206811130"
    nombre: "Luis Tirado (dueño)"
    razon: "Bloqueo bidireccional por seguridad"

  # Agrega aquí los números de las 14 asesoras:
  # - numero: "+57..."
  #   nombre: "Nombre asesora"
  #   razon: "Asesora humana del equipo"

# =============================================================================
# Configuración general de escalación
# =============================================================================
config:
  # ¿Enviar mensaje real a Fabio (vía whapi) o solo dejar alerta en DB?
  enviar_mensaje_real: true

  # Prefijo de mensajes que recibe Fabio (los identifica vs sus chats personales)
  prefijo_mensajes_fabio: "[BOT ASISTENTE]"

  # Si Fabio no responde una alerta crítica en X minutos, ¿escalar a otro?
  # (Fase 2 — no implementado todavía)
  reescalacion_tras_minutos: 60
